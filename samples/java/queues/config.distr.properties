# IoT domain group database connect string from OCI IoT.
db.connect.string=tcps:adb.region.oraclecloud.com:1521/your_database_low.adb.oraclecloud.com?retry_count=20&retry_delay=3

# IoT domain group database token scope from OCI IoT.
db.token.scope=urn:oracle:db::id::ocid1.compartment.oc1..exampleuniqueID

# Short hostname prefix of the IoT domain device host.
iot.domain.short.name=yourdomainshortname

# One of: ConfigFileAuthentication, SecurityToken, InstancePrincipal
oci.auth.type=ConfigFileAuthentication

# OCI CLI profile name for ConfigFileAuthentication or SecurityToken.
oci.profile=DEFAULT

# Optional. Leave blank to use ~/.oci/config.
oci.config.file=

# Durable subscriber name on the normalized JSON queue.
subscriber.name=java_queue_subscriber
